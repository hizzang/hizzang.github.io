name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'astro.config.mjs'
      - 'tsconfig.json'
      - '.github/workflows/**'
      - 'design.md'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Sync build to repository root
        run: |
          cp dist/index.html .
          cp dist/rss.xml .
          cp dist/favicon.svg public/favicon.svg
          rm -rf _astro about blog projects games ko en ja
          cp -r dist/_astro dist/about dist/blog dist/projects dist/games dist/ko dist/en dist/ja .

      - name: Commit and push built site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html rss.xml _astro about blog projects games ko en ja public/favicon.svg
          if git diff --staged --quiet; then
            echo "No site changes to deploy"
          else
            git commit -m "chore: deploy built site to root"
            git push
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
